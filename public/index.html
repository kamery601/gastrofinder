<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>GastroFinder</title>
<meta name="description" content="Sprawdź co jest otwarte — restauracje, bary i sklepy w Twojej okolicy.">
<meta name="theme-color" content="#412402">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GastroFinder">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icons/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<style>
:root{
  --a50:#FAEEDA;--a100:#FAC775;--a200:#EF9F27;--a400:#BA7517;--a600:#854F0B;--a800:#633806;--a900:#412402;
  --t400:#1D9E75;--t600:#0F6E56;
  --g50:#F7F5EF;--g100:#EDEAE0;--g200:#D3D1C7;--g400:#888780;--g600:#5F5E5A;--g800:#2C2C2A;
  --r50:#FCEBEB;--r400:#E24B4A;--r800:#791F1F;
  --gr50:#EAF3DE;--gr400:#639922;--gr800:#27500A;
  --p50:#F3EEFF;--p400:#7C3AED;--p800:#4C1D95;
  --b50:#EFF6FF;--b400:#2563EB;--b800:#1E3A8A;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--g50);color:var(--g800);min-height:100vh;}

.header{background:var(--a900);padding:2.5rem 1.5rem 5rem;position:relative;overflow:hidden;}
.header::before{content:'';position:absolute;top:-60px;right:-60px;width:280px;height:280px;background:var(--a800);border-radius:50%;opacity:.4;}
.header::after{content:'';position:absolute;bottom:-80px;left:10%;width:200px;height:200px;background:var(--a600);border-radius:50%;opacity:.2;}
.header-inner{max-width:960px;margin:0 auto;position:relative;z-index:2;}
.logo{font-family:'Fraunces',serif;font-size:2.4rem;font-weight:700;color:var(--a100);letter-spacing:-.5px;line-height:1;}
.logo span{color:var(--a200);font-style:italic;}
.tagline{color:var(--a200);font-size:.9rem;margin-top:.4rem;}

.search-card{max-width:960px;margin:-3rem auto 0;padding:0 1.5rem;position:relative;z-index:10;}
.search-box{background:white;border-radius:20px;padding:1.75rem;box-shadow:0 4px 32px rgba(65,36,2,.13);border:1px solid var(--a100);}
.country-bar{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid var(--g100);}
.country-btn{font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;padding:.5rem 1rem;border-radius:20px;cursor:pointer;border:1.5px solid var(--g200);background:white;color:var(--g600);transition:all .15s;}
.country-btn[aria-pressed="true"]{background:var(--a900);color:var(--a100);border-color:var(--a900);}
.country-btn[aria-pressed="false"]:hover{border-color:var(--a400);color:var(--a600);}
.country-btn:focus-visible{outline:2px solid var(--a400);outline-offset:2px;}
.search-row{display:flex;gap:.75rem;align-items:center;flex-wrap:wrap;}
.city-input{flex:1;min-width:220px;font-family:'DM Sans',sans-serif;font-size:1.05rem;padding:.85rem 1.1rem;border:1.5px solid var(--g200);border-radius:12px;color:var(--g800);outline:none;background:var(--g50);transition:border-color .2s;}
.city-input:focus{border-color:var(--a200);background:white;}
.city-input::placeholder{color:var(--g400);}
.search-btn{font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:600;padding:.85rem 1.4rem;background:var(--a400);color:white;border:none;border-radius:12px;cursor:pointer;transition:background .2s;white-space:nowrap;}
.search-btn:hover{background:var(--a600);}
.search-btn:disabled{background:var(--g200);color:var(--g400);cursor:not-allowed;}

.regions-bar,.places-bar{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--g100);align-items:center;}
.regions-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--g600);margin-right:.25rem;}
.region-chip{font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;padding:.45rem .9rem;border-radius:20px;cursor:pointer;border:1.5px solid var(--g200);background:white;color:var(--g600);transition:all .15s;}
.region-chip[aria-pressed="true"]{background:var(--a50);color:var(--a800);border-color:var(--a200);}
.region-chip:hover{border-color:var(--a400);color:var(--a600);}
.region-chip:focus-visible{outline:2px solid var(--a400);outline-offset:2px;}
.place-chip{font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;padding:.42rem .85rem;border-radius:10px;cursor:pointer;border:1.5px solid var(--a100);background:var(--a50);color:var(--a800);transition:all .15s;}
.place-chip:hover{background:var(--a100);border-color:var(--a200);}
.place-chip:focus-visible{outline:2px solid var(--a400);outline-offset:2px;}
.time-bar{display:flex;align-items:center;gap:.75rem;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--g100);flex-wrap:wrap;}
.time-label{font-size:.78rem;font-weight:600;color:var(--g600);letter-spacing:.5px;text-transform:uppercase;}
.time-input{font-family:'DM Sans',sans-serif;font-size:.88rem;padding:.4rem .75rem;border:1.5px solid var(--g200);border-radius:8px;background:var(--g50);color:var(--g800);outline:none;}
.time-reset{font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;padding:.4rem .75rem;background:var(--a50);color:var(--a600);border:1px solid var(--a100);border-radius:8px;cursor:pointer;}

.mode-tabs{display:flex;gap:.5rem;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--g100);flex-wrap:wrap;}
.mode-tab{font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;padding:.5rem 1.1rem;border-radius:20px;cursor:pointer;border:1.5px solid transparent;transition:all .15s;display:flex;align-items:center;gap:.4rem;}
.mode-tab.food.active{background:var(--a900);color:var(--a100);border-color:var(--a900);}
.mode-tab.food.inactive{background:white;color:var(--g600);border-color:var(--g200);}
.mode-tab.food.inactive:hover{border-color:var(--a400);color:var(--a600);}
.mode-tab.clubs.active{background:var(--p800);color:#e9d5ff;border-color:var(--p800);}
.mode-tab.clubs.inactive{background:white;color:var(--g600);border-color:var(--g200);}
.mode-tab.clubs.inactive:hover{border-color:var(--p400);color:var(--p400);}
.mode-tab.shops24.active{background:var(--b800);color:#bfdbfe;border-color:var(--b800);}
.mode-tab.shops24.inactive{background:white;color:var(--g600);border-color:var(--g200);}
.mode-tab.shops24.inactive:hover{border-color:var(--b400);color:var(--b400);}

.content{max-width:960px;margin:2rem auto;padding:0 1.5rem;}
.toolbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.75rem;}
.sort-bar{display:flex;gap:.5rem;flex-wrap:wrap;}
.sort-btn{font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;padding:.45rem 1rem;border-radius:20px;cursor:pointer;border:1.5px solid transparent;transition:all .15s;}
.sort-btn.active{background:var(--a900);color:var(--a100);border-color:var(--a900);}
.sort-btn.inactive{background:white;color:var(--g600);border-color:var(--g200);}
.sort-btn.inactive:hover{border-color:var(--a200);color:var(--a600);}

.filters-panel{background:white;border:1px solid var(--g100);border-radius:16px;padding:1rem 1.1rem;margin-bottom:1rem;display:grid;gap:.85rem;}
.filters-title{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--g600);}
.filters-row{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;}
.filter-label{font-size:.78rem;font-weight:600;color:var(--g600);min-width:88px;}
.filter-select{font-family:'DM Sans',sans-serif;font-size:.82rem;padding:.42rem .7rem;border:1.5px solid var(--g200);border-radius:10px;background:var(--g50);color:var(--g800);}
.filter-chip{font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;padding:.42rem .85rem;border-radius:20px;cursor:pointer;border:1.5px solid var(--g200);background:white;color:var(--g600);transition:all .15s;}
.filter-chip.active{background:var(--a900);color:var(--a100);border-color:var(--a900);}
.filter-chip.toggle.active{background:var(--gr50);color:var(--gr800);border-color:var(--gr400);}
.filter-chip.venue.active{background:var(--a50);color:var(--a800);border-color:var(--a200);}

.legend{display:flex;gap:1rem;font-size:.75rem;color:var(--g600);flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:.35rem;}
.legend-dot{width:8px;height:8px;border-radius:50%;}
.legend-dot.open{background:var(--gr400);}
.legend-dot.closed{background:var(--r400);}
.legend-dot.unknown{background:var(--g400);}

.location-context{margin-bottom:.75rem;font-size:.82rem;color:var(--g600);}
.location-context #locationResultsFor{font-weight:600;color:var(--g800);}
.location-context #locationDistanceNote{font-size:.78rem;color:var(--g600);margin-top:.1rem;}

.status-bar{display:flex;align-items:center;gap:.6rem;margin-bottom:1rem;font-size:.82rem;color:var(--g600);}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.status-dot.searching{background:var(--a200);animation:pulse 1.5s infinite;}
.status-dot.done{background:var(--t400);}
.status-dot.error{background:var(--r400);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

#resultsMap{display:none;height:300px;border-radius:16px;border:1px solid var(--g100);margin-bottom:1rem;overflow:hidden;z-index:1;}
.gf-pin-wrap{background:transparent;border:none;}
.gf-pin{display:block;width:18px;height:18px;border-radius:50%;border:2px solid white;box-shadow:0 2px 8px rgba(0,0,0,.28);}
.gf-popup{font-family:'DM Sans',sans-serif;font-size:.82rem;line-height:1.45;min-width:180px;}
.gf-popup strong{display:block;font-size:.92rem;margin-bottom:.25rem;color:var(--g800);}
.gf-popup-meta{color:var(--g600);margin-bottom:.15rem;}
.gf-popup a{color:var(--t600);font-weight:600;text-decoration:none;}
.gf-popup a:hover{text-decoration:underline;}

.restaurants-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;}
.resto-card{background:white;border-radius:16px;border:1px solid var(--g100);overflow:hidden;transition:transform .15s,box-shadow .15s;display:flex;flex-direction:column;}
.resto-card:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(65,36,2,.1);}
.resto-card.is-open{border-left:3px solid var(--gr400);}
.resto-card.is-closed{border-left:3px solid var(--r400);opacity:.8;}
.resto-card.is-unknown{border-left:3px solid var(--g200);}
.resto-card.mode-clubs.is-open{border-left-color:var(--p400);}
.resto-card.mode-clubs.is-closed{border-left-color:#c4b5fd;}
.resto-card.mode-shops24.is-open{border-left-color:var(--b400);}
.resto-card.mode-shops24.is-closed{border-left-color:#93c5fd;}

.card-body{padding:1.1rem 1.25rem 1rem;flex:1;}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;margin-bottom:.3rem;}
.card-name{font-family:'Fraunces',serif;font-size:1rem;font-weight:600;color:var(--g800);line-height:1.3;}
.open-badge{flex-shrink:0;font-size:.65rem;font-weight:700;padding:.2rem .55rem;border-radius:20px;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;}
.open-badge.open{background:var(--gr50);color:var(--gr800);}
.open-badge.closed{background:var(--r50);color:var(--r800);}
.open-badge.unknown{background:var(--g100);color:var(--g600);}
.card-type{font-size:.73rem;color:var(--g600);font-weight:500;margin-bottom:.3rem;}
.hours-detail{font-size:.73rem;color:var(--g600);font-weight:600;margin:0 0 .75rem;}
.card-address{display:flex;align-items:flex-start;gap:.4rem;font-size:.8rem;color:var(--g600);text-decoration:none;margin-bottom:.85rem;line-height:1.4;}
.card-address:hover{color:var(--a400);}
.maps-btn{display:inline-flex;align-items:center;gap:.35rem;font-size:.78rem;font-weight:600;color:var(--t600);text-decoration:none;}
.maps-btn:hover{color:var(--t400);}
.card-footer{display:flex;align-items:center;justify-content:space-between;padding:.65rem 1.25rem;background:var(--g50);border-top:1px solid var(--g100);}
.rating-badge{display:flex;align-items:center;gap:.3rem;font-size:.85rem;font-weight:600;color:var(--a600);}
.rating-count{font-size:.72rem;color:var(--g600);font-weight:400;}
.distance-badge{font-size:.78rem;font-weight:600;color:var(--g600);}
.low-sample-hint{font-size:.68rem;font-style:italic;color:var(--g600);}
.price-badge{font-size:.82rem;font-weight:700;color:var(--g600);}
.price-unknown{font-size:.68rem;font-weight:500;font-style:italic;color:var(--g600);}
.sort-btn:disabled{opacity:.45;cursor:not-allowed;}
.sort-btn:disabled:hover{border-color:var(--g200);color:var(--g600);}

.empty-state{text-align:center;padding:3rem 1rem;color:var(--g600);grid-column:1/-1;border-radius:16px;}
.empty-state h3{font-family:'Fraunces',serif;font-size:1.1rem;color:var(--g600);margin-bottom:.4rem;}
.empty-state h3::before{content:'🔍 ';}
.empty-state.is-error{background:var(--r50);}
.empty-state.is-error h3{color:var(--r800);}
.empty-state.is-error h3::before{content:'⚠️ ';}
.empty-state.is-error p{color:var(--r800);opacity:.85;}
.skeleton{background:linear-gradient(90deg,var(--g100) 25%,var(--g50) 50%,var(--g100) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:16px;height:190px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.site-footer{margin-top:48px;padding:18px 24px;text-align:center;font-size:.78rem;color:#888;border-top:1px solid #e5e7eb}
.site-footer a{color:#6366f1;text-decoration:none;font-weight:500}
.site-footer a:hover{opacity:.75;text-decoration:underline}
.site-footer .heart{color:#e55;margin:0 2px}

@media(max-width:600px){
  .logo{font-size:1.8rem;}
  .search-row{flex-direction:column;}
  .search-btn{width:100%;}
  #resultsMap{height:240px;}
  .sort-btn,.mode-tab,.filter-chip,.time-reset,.country-btn,.region-chip,.place-chip{min-height:44px;padding-top:.7rem;padding-bottom:.7rem;}
  .maps-btn{min-height:44px;padding:.4rem 0;}
  .card-address{min-height:44px;}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">Gastro<span>Finder</span></div>
    <p class="tagline">Restauracje · Kawiarnie · Bary · Sklepy — sprawdź czy otwarte</p>
  </div>
</header>

<div class="search-card">
  <div class="search-box">
    <div class="country-bar" role="group" aria-label="Wybierz kraj wyszukiwania">
      <button type="button" class="country-btn" id="country-PL" onclick="setCountry('PL')" aria-pressed="true">🇵🇱 Polska</button>
      <button type="button" class="country-btn" id="country-SK" onclick="setCountry('SK')" aria-pressed="false">🇸🇰 Słowacja</button>
      <button type="button" class="country-btn" id="country-HU" onclick="setCountry('HU')" aria-pressed="false">🇭🇺 Węgry</button>
    </div>
    <div class="search-row">
      <input type="text" id="cityInput" class="city-input"
        placeholder="Wpisz miasto lub dzielnicę, np. Kraków, Kazimierz"
        autocomplete="off" onkeydown="if(event.key==='Enter')startSearch()"/>
      <button class="search-btn" id="searchBtn" onclick="startSearch()">Szukaj</button>
      <button class="search-btn" id="geoBtn" onclick="useMyLocation()">📍 Użyj mojej lokalizacji</button>
      <button class="search-btn" id="installBtn" style="display:none;background:var(--a800);">📲 Zainstaluj</button>
    </div>
    <div class="regions-bar" id="regionsBar" role="group" aria-label="Regiony turystyczne" style="display:none"></div>
    <div class="places-bar" id="placesBar" role="group" aria-label="Miejscowości w regionie" style="display:none"></div>
    <div class="time-bar">
      <span class="time-label">Czas:</span>
      <input type="time" id="simulatedTime" class="time-input"/>
      <button class="time-reset" onclick="resetToNow()">Teraz</button>
    </div>
    <div class="mode-tabs">
      <button class="mode-tab food active" id="tab-food" onclick="setMode('food')">🍽️ Restauracje i bary</button>
      <button class="mode-tab clubs inactive" id="tab-clubs" onclick="setMode('clubs')">🎵 Kluby i dyskoteki</button>
      <button class="mode-tab shops24 inactive" id="tab-shops24" onclick="setMode('shops24')">🏪 Sklepy całodobowe</button>
    </div>
  </div>
</div>

<div class="content" id="mainContent" style="display:none">
  <div class="toolbar">
    <div class="sort-bar">
      <button class="sort-btn active" id="sort-rating" onclick="setSort('rating')">⭐ Najlepsze</button>
      <button class="sort-btn inactive" id="sort-distance" onclick="setSort('distance')">📍 Najbliższe</button>
      <button class="sort-btn inactive" id="sort-price" onclick="setSort('price')">💰 Najtańsze</button>
      <button class="sort-btn inactive" id="sort-value" onclick="setSort('value')">🏆 Jakość/Cena</button>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot open"></div>Otwarte</div>
      <div class="legend-item"><div class="legend-dot closed"></div>Zamknięte</div>
      <div class="legend-item"><div class="legend-dot unknown"></div>Brak danych</div>
    </div>
  </div>

  <div class="filters-panel">
    <div class="filters-title">Filtry</div>
    <div class="filters-row">
      <span class="filter-label">Max odległość</span>
      <select id="filterMaxDistance" class="filter-select" aria-label="Maksymalna odległość">
        <option value="">Bez limitu</option>
        <option value="0.5">500 m</option>
        <option value="1">1 km</option>
        <option value="2">2 km</option>
        <option value="5">5 km</option>
      </select>
      <span class="filter-label">Min. ocena</span>
      <select id="filterMinRating" class="filter-select" aria-label="Minimalna ocena">
        <option value="0">Dowolna</option>
        <option value="3.5">3.5+</option>
        <option value="4">4.0+</option>
        <option value="4.5">4.5+</option>
      </select>
      <button type="button" class="filter-chip toggle" id="filterOnlyOpen">🔓 Tylko otwarte</button>
      <button type="button" class="filter-chip toggle" id="filterHideUnknown">Ukryj „brak danych”</button>
    </div>
    <div class="filters-row" id="venueTypeRow">
      <span class="filter-label">Typ lokalu</span>
      <button type="button" class="filter-chip venue" data-venue-type="pizza">🍕 Pizza</button>
      <button type="button" class="filter-chip venue" data-venue-type="kebab">🥙 Kebab</button>
      <button type="button" class="filter-chip venue" data-venue-type="cafe">☕ Kawiarnia</button>
      <button type="button" class="filter-chip venue" data-venue-type="restaurant">🍽️ Restauracja</button>
      <button type="button" class="filter-chip venue" data-venue-type="bar">🍺 Bar</button>
    </div>
  </div>

  <div class="location-context" id="locationContext" style="display:none">
    <div id="locationResultsFor"></div>
    <div id="locationDistanceNote"></div>
  </div>

  <div class="status-bar">
    <div class="status-dot done" id="statusDot"></div>
    <span id="statusText">Gotowy</span>
  </div>

  <div id="resultsMap" aria-label="Mapa wyników"></div>
  <div id="restaurantsList" class="restaurants-grid"></div>
</div>

<footer class="site-footer">Twórca strony: <a href="https://tel-service.pl/" target="_blank" rel="noopener">TEL-SERVICE</a> <span class="heart">♥</span> przez V</footer>

<script src="/countries.js"></script>
<script src="/regions.js"></script>
<script src="/opening-hours.js"></script>
<script src="/location-context.js"></script>
<script src="/ranking-ui.js"></script>
<script src="/filters-ui.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="/map-view.js"></script>
<script src="/app.js"></script>
</body>
</html>
